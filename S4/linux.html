
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0d1b2a}
.wrap{background:#0d1b2a;padding:16px 0;position:relative}
svg{display:block;width:100%;overflow:visible}
.node-box{cursor:pointer;transition:opacity .2s}
.node-box:hover rect{filter:brightness(1.3)}

/* Modal overlay */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#0d1b2a;border:1.5px solid #444;border-radius:14px;padding:24px;max-width:420px;width:90%;position:relative;max-height:85vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;line-height:1;font-family:Arial}
.modal-close:hover{color:#fff}
.modal-year{font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.modal-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px}
.modal-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:16px}
.modal-desc{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.modal-section{margin-bottom:12px}
.modal-section h4{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;color:rgba(255,255,255,0.4)}
.modal-item{font-size:12px;color:rgba(255,255,255,0.8);padding:3px 0 3px 14px;position:relative;line-height:1.5}
.modal-item::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%}
.modal-item.pro::before{background:#2E8B7A}
.modal-item.con::before{background:#7D2027}
.ar-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:1px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;color:rgba(255,255,255,0.5);margin-bottom:16px}
</style>

<script>
const DATA={
  k001:{year:'1991',color:'#1db88a',title:'Kernel Linux 0.01',sub:'Linus Torvalds · Helsinki',
    desc:'Linus Torvalds anuncia en el grupo de noticias comp.os.minix un sistema operativo "hobby" para procesadores 386/486. El kernel tenía apenas 10,239 líneas de código y solo corría en hardware x86.',
    feats:['10,239 líneas de código fuente','Solo arquitectura x86 (386/486)','Inspirado en Minix de Andrew Tanenbaum','Monolítico desde su concepción','Sin soporte de red inicial'],
    pros:['Código abierto desde el inicio','Arquitectura monolítica = alto rendimiento','Base sólida para iteraciones rápidas','Comunidad de desarrollo inmediata'],
    cons:['Sin portabilidad a otras arquitecturas','Sin soporte de red ni multiusuario real','Muy limitado en drivers de dispositivos','Solo usable por expertos en C']},
  gpl:{year:'1992',color:'#1db88a',title:'Licencia GPL v2',sub:'GNU + Minix influences',
    desc:'Linux adopta la GNU General Public License v2, decisión que transforma radicalmente el proyecto. Esto permite que cualquiera use, modifique y redistribuya el código, siempre que las modificaciones sean también libres.',
    feats:['Adopción de GPL v2 completa','Integración de herramientas GNU (gcc, bash)','Separación definitiva de Minix','Inicio del ecosistema GNU/Linux','Primer sistema completo funcional'],
    pros:['Garantiza libertad permanente del código','Atrae masivamente a desarrolladores','Protege contra apropiación corporativa','Permite distribución comercial legal'],
    cons:['Restricciones de compatibilidad con licencias privativas','Obliga a publicar modificaciones derivadas','Conflictos con drivers propietarios de hardware','GPL "viral" puede limitar adopción empresarial']},
  debian:{year:'1993',color:'#CC8800',title:'Debian & Slackware',sub:'Primeras distribuciones',
    desc:'Aparecen las primeras distribuciones Linux organizadas. Debian, fundada por Ian Murdock, adopta un sistema de paquetería formal. Slackware de Patrick Volkerding fue la primera distribución en alcanzar popularidad masiva.',
    feats:['Sistema de paquetes .deb (Debian)','Paquetes tar.gz (Slackware)','Primer gestor de paquetes rudimentario','Base para cientos de distros futuras','Filosofía de software libre estricta (Debian)'],
    pros:['Facilitan instalación para no expertos','Estabilidad y reproducibilidad del sistema','Base comunitaria sólida y duradera','Debian aún activa 30+ años después'],
    cons:['Ciclos de actualización muy lentos','Slackware: sin resolución automática de dependencias','Debian: proceso de release extremadamente conservador','Fragmentación temprana del ecosistema Linux']},
  redhat:{year:'1994',color:'#C0392B',title:'Red Hat & SUSE',sub:'Linux empresarial nace',
    desc:'Red Hat Enterprise Linux y SUSE llevan Linux al mundo corporativo. Red Hat introduce el formato RPM (Red Hat Package Manager) que se convierte en estándar en el mundo empresarial, mientras SUSE domina Europa.',
    feats:['Formato RPM de gestión de paquetes','Soporte comercial certificado','Red Hat Network (actualización remota)','YaST de SUSE (configuración gráfica)','Primer Linux con soporte empresarial formal'],
    pros:['Soporte profesional garantizado','Certificaciones para servidores empresariales','Ciclos de vida largos (10 años RHEL)','Impulsa adopción corporativa de Linux'],
    cons:['Costo de suscripción elevado','Modelo semi-cerrado en Red Hat','Fragmentación RPM vs DEB persiste hoy','Tensión con comunidad de software libre puro']},
  ubuntu:{year:'2004',color:'#E67E22',title:'Ubuntu',sub:'Canonical · Linux para todos',
    desc:'Mark Shuttleworth funda Canonical y lanza Ubuntu basado en Debian. Su filosofía "Linux para seres humanos" democratiza el sistema operativo con lanzamientos cada 6 meses y versiones LTS de soporte extendido.',
    feats:['Basado en Debian testing','Ciclos de 6 meses + LTS de 5 años','Escritorio GNOME por defecto','Live CD para probar sin instalar','Centro de software unificado','Unity/GNOME Shell interface moderna'],
    pros:['Instalación y uso accesible para todos','Enorme comunidad y documentación','Ideal para educación e introducción a Linux','Impulsa adopción masiva en desktop'],
    cons:['Decisiones polémicas (Unity, Mir, Snap)','Paquetes Snap controversiales','Dependencia de Canonical para decisiones clave','A veces inestable en versiones no-LTS']},
  android:{year:'2008',color:'#1db88a',title:'Android',sub:'Google · Linux en el bolsillo',
    desc:'Google lanza Android, sistema operativo móvil basado en el kernel Linux pero con una pila de software completamente diferente. Se convierte en el sistema operativo más usado del mundo con más de 3 billones de dispositivos activos.',
    feats:['Kernel Linux modificado (fork especializado)','Runtime Dalvik → ART (Android 5.0+)','Arquitectura ARM predominante','Play Store con millones de apps','HAL (Hardware Abstraction Layer)','Binder IPC en lugar de POSIX IPC'],
    pros:['Adopción masiva: +72% del mercado móvil','Ecosistema de apps enorme','Democratiza smartphones a nivel global','Prueba la versatilidad del kernel Linux'],
    cons:['Fragmentación severa de versiones','Kernel muy divergente del mainline','Modelo de privacidad cuestionado','Actualizaciones lentas por fabricantes OEM']},
  k3:{year:'2011',color:'#5B9BD5',title:'Kernel 3.x',sub:'cgroups · contenedores · escalabilidad',
    desc:'El kernel 3.0 marca la madurez técnica de Linux. Se consolidan los control groups (cgroups) que permiten limitar y aislar recursos de procesos, tecnología fundamental que habilita Docker y Kubernetes años después.',
    feats:['cgroups v1 estabilizado','Namespaces de procesos','KVM maduro para virtualización','Soporte mejorado de ARM','Ext4 como sistema de archivos estándar','Soporte inicial de Btrfs'],
    pros:['Base tecnológica de contenedores Docker','Virtualización KVM de clase enterprise','Excelente soporte de hardware moderno','Escalabilidad hasta miles de CPU cores'],
    cons:['cgroups v1 con diseño complejo y limitaciones','Btrfs aún inestable en producción','Deuda técnica acumulada en subsistemas antiguos','Curva de configuración alta para admins']},
  k4:{year:'2015',color:'#9B59B6',title:'Kernel 4.x + systemd',sub:'Era moderna de Linux',
    desc:'El kernel 4.x trae soporte masivo de hardware moderno y eBPF. systemd se convierte en el init system dominante en la mayoría de distribuciones, reemplazando SysVinit y Upstart con inicio paralelo de servicios.',
    feats:['eBPF: programación dinámica del kernel','systemd como init system universal','Live kernel patching (kpatch)','Soporte NVMe y almacenamiento ultra-rápido','cgroups v2 (rediseño completo)','DAX: acceso directo a almacenamiento persistente'],
    pros:['eBPF revoluciona observabilidad y seguridad','systemd: arranque 10x más rápido','Live patching sin reiniciar servidores','Soporte hardware de vanguardia'],
    cons:['systemd: controversia por "hace demasiado"','eBPF: superficie de ataque nueva','Complejidad creciente del kernel','Ruptura de compatibilidad en scripts de init']},
  wsl2:{year:'2019',color:'#2EC4B6',title:'WSL2',sub:'Windows Subsystem for Linux 2',
    desc:'Microsoft lanza WSL2 con un kernel Linux real ejecutando dentro de Hyper-V. Esto permite correr aplicaciones Linux nativas en Windows con rendimiento casi nativo, marcando la reconciliación histórica entre Microsoft y Linux.',
    feats:['Kernel Linux real (no emulación)','Virtualización Hyper-V ultraligera','Integración con Windows Explorer y VS Code','Soporte de GPU (CUDA, DirectML)','Systemd soportado desde 2022','Docker Desktop sobre WSL2'],
    pros:['Entorno Linux nativo en Windows','Rendimiento de I/O cercano al nativo','Ideal para desarrolladores web/devops','Elimina necesidad de dual-boot para muchos'],
    cons:['Latencia en acceso a sistema de archivos Windows','Consumo de memoria elevado','Networking con limitaciones','No reemplaza Linux nativo para producción']},
  k6:{year:'2024',color:'#1db88a',title:'Kernel 6.x',sub:'Rust · IA · seguridad moderna',
    desc:'El kernel 6.x introduce Rust como segundo lenguaje oficial del kernel Linux junto a C, permitiendo escribir drivers con garantías de seguridad de memoria. Se consolidan características de IA, soporte de aceleradores y seguridad avanzada.',
    feats:['Rust como lenguaje oficial del kernel','Drivers escritos en Rust (seguridad de memoria)','Soporte de aceleradores de IA (NPU/GPU)','io_uring v2: I/O asíncrono avanzado','Landlock LSM: sandboxing por apps','RISC-V como arquitectura de primera clase'],
    pros:['Rust elimina clases enteras de bugs de memoria','Soporte nativo de hardware IA moderno','Mayor seguridad sin sacrificar rendimiento','RISC-V abre hardware libre de patentes'],
    cons:['Curva de aprendizaje de Rust para contribuidores','Fricción entre comunidad C y Rust','Tiempo de compilación mayor con Rust','Ecosistema de drivers Rust aún incipiente']}
};

function openModal(id){
  const d=DATA[id];
  if(!d)return;
  document.getElementById('mYear').textContent=d.year;
  document.getElementById('mYear').style.color=d.color;
  document.getElementById('mTitle').textContent=d.title;
  document.getElementById('mSub').textContent=d.sub;
  document.getElementById('mDesc').textContent=d.desc;
  document.getElementById('modalBox').style.borderColor=d.color;
  document.querySelector('.modal-year').style.color=d.color;

  document.getElementById('mFeats').innerHTML=d.feats.map(f=>
    `<div class="modal-item" style="color:rgba(255,255,255,0.75)"><span style="position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:${d.color};display:block"></span>${f}</div>`
  ).join('');
  document.getElementById('mPros').innerHTML=d.pros.map(p=>
    `<div class="modal-item pro">${p}</div>`
  ).join('');
  document.getElementById('mCons').innerHTML=d.cons.map(c=>
    `<div class="modal-item con">${c}</div>`
  ).join('');

  document.getElementById('modalBg').classList.add('show');
}
function closeModal(e){
  if(e.target===document.getElementById('modalBg'))closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modalBg').classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect()});
</script>
