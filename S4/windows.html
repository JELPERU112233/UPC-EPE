function openModal(id){
  const d=DATA[id];
  if(!d)return;
  const yr=document.getElementById('mYr');
  yr.textContent=d.year; yr.style.color=d.color;
  document.getElementById('mTi').textContent=d.title;
  document.getElementById('mSu').textContent=d.sub;
  document.getElementById('mDs').textContent=d.desc;
  document.getElementById('modalBox').style.borderColor=d.color;
  const dot=c=>`<span style="position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:${c};display:block"></span>`;
  document.getElementById('mFe').innerHTML=d.feats.map(f=>`<div class="mi" style="color:rgba(255,255,255,0.78)">${dot(d.color)}${f}</div>`).join('');
  document.getElementById('mPr').innerHTML=d.pros.map(p=>`<div class="mi pro">${p}</div>`).join('');
  document.getElementById('mCo').innerHTML=d.cons.map(c=>`<div class="mi con">${c}</div>`).join('');
  document.getElementById('modalBg').classList.add('show');
}
function closeBg(e){if(e.target===document.getElementById('modalBg'))closeM();}
function closeM(){document.getElementById('modalBg').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
</script>
