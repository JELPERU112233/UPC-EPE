
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
.panel{padding:16px 0;background:#000;min-height:100%}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;padding:0 2px}
.tab{padding:7px 15px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;font-size:13px;font-family:Arial,sans-serif;cursor:pointer;background:transparent;color:rgba(255,255,255,0.5);transition:all .2s;user-select:none}
.tab:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8)}
.tab[data-arch="mono"].active{background:#7D2027;border-color:#7D2027;color:#fff}
.tab[data-arch="micro"].active{background:#0044CC;border-color:#0044CC;color:#fff}
.tab[data-arch="hybrid"].active{background:#CC8800;border-color:#CC8800;color:#fff}
.tab[data-arch="cs"].active{background:#2E8B7A;border-color:#2E8B7A;color:#fff}
.compare-btn{margin-left:auto;padding:7px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;font-size:13px;font-family:Arial,sans-serif;cursor:pointer;background:transparent;color:rgba(255,255,255,0.6);transition:all .2s;display:flex;align-items:center;gap:6px}
.compare-btn:hover{border-color:rgba(255,255,255,0.5);color:#fff}
.compare-btn.on{background:#fff;color:#000;border-color:#fff}
.vis-area{border:1px solid rgba(255,255,255,0.12);border-radius:12px;overflow:hidden;background:#000}
.info-bar{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:20px;flex-wrap:wrap;background:#0a0a0a}
.info-item{font-size:12px;font-family:Arial,sans-serif;color:rgba(255,255,255,0.4)}
.info-item span{font-weight:700;color:rgba(255,255,255,0.9);display:block;margin-top:1px}
.cmp-panel{display:none;margin-top:12px}
.cmp-panel.show{display:block}
.cmp-select{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.arch-sel{padding:6px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:13px;font-family:Arial,sans-serif;background:#111;color:#fff;cursor:pointer}
.vs{font-size:13px;font-weight:700;font-family:Arial,sans-serif;color:rgba(255,255,255,0.4)}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-card{border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;background:#0d0d0d}
.cmp-head{padding:10px 14px;font-size:13px;font-weight:700;font-family:Arial,sans-serif;color:#fff}
.cmp-body{padding:10px 14px}
.cmp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:12px;font-family:Arial,sans-serif}
.cmp-row:last-child{border-bottom:none}
.rl{color:rgba(255,255,255,0.45)}
.signal{stroke-dasharray:7 5;animation:dash 1.1s linear infinite}
.signal2{stroke-dasharray:7 5;animation:dash 1.5s linear infinite}
.signal3{stroke-dasharray:7 5;animation:dash 1.9s linear infinite}
@keyframes dash{to{stroke-dashoffset:-24}}
@media(prefers-reduced-motion:reduce){.signal,.signal2,.signal3{animation:none;opacity:.8}}
</style>

<h2 style="position:absolute;left:-9999px">Simulador de arquitecturas de sistemas operativos</h2>

<div class="panel">
  <div class="tabs">
    <button class="tab active" data-arch="mono" onclick="go('mono')">Monolítica</button>
    <button class="tab" data-arch="micro" onclick="go('micro')">Microkernel</button>
    <button class="tab" data-arch="hybrid" onclick="go('hybrid')">Híbrida</button>
    <button class="tab" data-arch="cs" onclick="go('cs')">Cliente-Servidor</button>
    <button class="compare-btn" id="cmpBtn" onclick="toggleCmp()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="4.5" height="11" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="7.5" y="1" width="4.5" height="11" rx="1" stroke="currentColor" stroke-width="1.1"/></svg>
      Comparar
    </button>
  </div>

  <div class="vis-area">
    <svg id="sv" width="100%" viewBox="0 0 680 340" role="img" style="display:block;background:#000">
      <title>Arquitectura de OS seleccionada</title>
      <desc>Diagrama animado de la arquitectura del sistema operativo</desc>
    </svg>
    <div class="info-bar">
      <div class="info-item">Rendimiento<span id="iP">—</span></div>
      <div class="info-item">Seguridad<span id="iS">—</span></div>
      <div class="info-item">Estabilidad<span id="iE">—</span></div>
      <div class="info-item">Ejemplos reales<span id="iX">—</span></div>
    </div>
  </div>

  <div class="cmp-panel" id="cmpPanel">
    <div class="cmp-select">
      <select class="arch-sel" id="sA" onchange="doCmp()">
        <option value="mono">Monolítica</option>
        <option value="micro">Microkernel</option>
        <option value="hybrid">Híbrida</option>
        <option value="cs">Cliente-Servidor</option>
      </select>
      <span class="vs">vs</span>
      <select class="arch-sel" id="sB" onchange="doCmp()">
        <option value="micro">Microkernel</option>
        <option value="mono">Monolítica</option>
        <option value="hybrid">Híbrida</option>
        <option value="cs">Cliente-Servidor</option>
      </select>
    </div>
    <div class="cmp-grid" id="cmpGrid"></div>
  </div>
</div>

<script>
const D={
  mono:{label:'Monolítica',color:'#7D2027',bg:'rgba(125,32,39,0.18)',mid:'rgba(125,32,39,0.35)',
    perf:'Muy alto',sec:'Bajo',stab:'Bajo',ex:'Linux, Unix, MS-DOS',
    desc:'Todos los servicios ejecutan en un único espacio de kernel privilegiado.',
    pros:['Rendimiento máximo sin overhead','Comunicación directa entre módulos','Implementación más simple'],
    cons:['Un fallo derriba todo el sistema','Difícil mantener y extender','Sin aislamiento entre componentes'],
    m:{perf:5,sec:2,stab:2,ipc:5,port:2,mod:1}},
  micro:{label:'Microkernel',color:'#0044CC',bg:'rgba(0,68,204,0.18)',mid:'rgba(0,68,204,0.35)',
    perf:'Moderado',sec:'Alto',stab:'Alto',ex:'Minix, QNX, L4, Mach',
    desc:'Kernel mínimo; servicios del OS como servidores en user space.',
    pros:['Alta estabilidad y seguridad','Fallo de servidor no derriba el OS','Extensible y portable'],
    cons:['Overhead continuo por IPC','Rendimiento inferior','Mayor complejidad de diseño'],
    m:{perf:3,sec:5,stab:5,ipc:2,port:5,mod:5}},
  hybrid:{label:'Híbrida',color:'#CC8800',bg:'rgba(204,136,0,0.18)',mid:'rgba(204,136,0,0.35)',
    perf:'Alto',sec:'Medio',stab:'Medio',ex:'Windows NT, macOS XNU, Android',
    desc:'Núcleo extendido + servicios opcionales en user space. Balance pragmático.',
    pros:['Balance rendimiento/seguridad','Compatible con drivers legacy','Flexible y adaptable'],
    cons:['Mayor complejidad arquitectónica','Superficie de ataque intermedia','Trade-offs constantes'],
    m:{perf:4,sec:3,stab:3,ipc:3,port:3,mod:3}},
  cs:{label:'Cliente-Servidor',color:'#2E8B7A',bg:'rgba(46,139,122,0.18)',mid:'rgba(46,139,122,0.35)',
    perf:'Variable',sec:'Alto',stab:'Alto',ex:'Plan 9, Amoeba, Chorus',
    desc:'OS como red de servidores independientes que responden solicitudes de clientes.',
    pros:['Máxima modularidad','Distribuible en red real','Fallos completamente aislados'],
    cons:['Latencia de red/IPC significativa','Sincronización compleja','Overhead elevado'],
    m:{perf:2,sec:4,stab:4,ipc:2,port:5,mod:5}}
};

const FF='Arial,sans-serif';
const DEFS=`<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

function R(x,y,w,h,rx,fill,stroke,sw){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx||6}" fill="${fill||'none'}" stroke="${stroke||'none'}" stroke-width="${sw||0.5}"/>`;
}
function TW(x,y,t,fs,fw){
  return `<text x="${x}" y="${y}" font-size="${fs||12}" font-weight="${fw||400}" font-family="${FF}" fill="#ffffff" text-anchor="middle" dominant-baseline="central">${t}</text>`;
}
function TG(x,y,t,fs,fw){
  return `<text x="${x}" y="${y}" font-size="${fs||11}" font-weight="${fw||400}" font-family="${FF}" fill="rgba(255,255,255,0.45)" text-anchor="middle" dominant-baseline="central">${t}</text>`;
}
function L(x1,y1,x2,y2,cls,w){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffffff" stroke-width="${w||1.5}" marker-end="url(#ar)" class="${cls||''}"/>`;
}
function LD(x1,y1,x2,y2,color){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ar)"/>`;
}

function renderMono(){
  const {color:c,bg,mid}=D.mono;
  return DEFS+`
  ${TG(340,16,'Arquitectura Monolítica — espacio único de kernel privilegiado',11,700)}
  ${R(36,30,608,196,14,c,'none',0)}
  ${R(36,30,608,196,14,'none',c,1.5)}
  ${TW(340,50,'KERNEL SPACE — modo privilegiado',13,700)}
  ${TW(340,65,'todos los servicios comparten el mismo espacio de memoria',11,400)}
  ${R(58,80,172,54,8,'rgba(255,255,255,0.10)','rgba(255,255,255,0.35)',0.9)}
  ${TW(144,107,'Gestión de procesos',12,700)}
  ${R(254,80,172,54,8,'rgba(255,255,255,0.10)','rgba(255,255,255,0.35)',0.9)}
  ${TW(340,107,'Sistema de archivos',12,700)}
  ${R(450,80,172,54,8,'rgba(255,255,255,0.10)','rgba(255,255,255,0.35)',0.9)}
  ${TW(536,107,'Gestión de memoria',12,700)}
  ${R(58,154,172,58,8,'rgba(255,255,255,0.06)','rgba(255,255,255,0.22)',0.9)}
  ${TW(144,183,'Drivers dispositivos',12,700)}
  ${R(254,154,172,58,8,'rgba(255,255,255,0.06)','rgba(255,255,255,0.22)',0.9)}
  ${TW(340,183,'Protocolos de red',12,700)}
  ${R(450,154,172,58,8,'rgba(255,255,255,0.06)','rgba(255,255,255,0.22)',0.9)}
  ${TW(536,183,'IPC & Señales',12,700)}
  <line x1="58" y1="150" x2="622" y2="150" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-dasharray="4 3"/>
  ${L(144,134,144,154,'signal')}
  ${L(340,134,340,154,'signal2')}
  ${L(536,134,536,154,'signal3')}
  ${L(230,107,254,107,'signal',1)}
  ${L(426,107,450,107,'signal2',1)}
  ${L(230,183,254,183,'signal3',1)}
  ${L(426,183,450,183,'signal',1)}
  ${R(36,238,608,64,10,bg,'rgba(125,32,39,0.5)',0.9)}
  ${TW(340,260,'USER SPACE — Aplicaciones',13,700)}
  ${TG(340,277,'syscall directa al kernel · sin separación de privilegios entre módulos',11,400)}
  ${LD(340,238,340,226,c)}
  ${TG(340,320,'Un único binario — Linux ~20M líneas de código en ring 0',11,400)}
  `;
}

function renderMicro(){
  const {color:c,bg,mid}=D.micro;
  return DEFS+`
  ${TG(340,16,'Arquitectura Microkernel — núcleo mínimo + servidores en user space',11,700)}
  ${R(36,30,608,72,12,c,'none',0)}
  ${R(36,30,608,72,12,'none',c,1.5)}
  ${TW(340,50,'MICROKERNEL — modo privilegiado (ring 0)',13,700)}
  ${TW(340,65,'solo IPC · scheduling · gestión básica de memoria · IRQ base',11,400)}
  ${R(56,82,108,32,6,'rgba(0,68,204,0.7)','rgba(255,255,255,0.3)',0.9)}${TW(110,98,'IPC',12,700)}
  ${R(176,82,120,32,6,'rgba(0,68,204,0.7)','rgba(255,255,255,0.3)',0.9)}${TW(236,98,'Scheduling',12,700)}
  ${R(308,82,128,32,6,'rgba(0,68,204,0.7)','rgba(255,255,255,0.3)',0.9)}${TW(372,98,'Mem. básica',12,700)}
  ${R(448,82,108,32,6,'rgba(0,68,204,0.7)','rgba(255,255,255,0.3)',0.9)}${TW(502,98,'IRQ base',12,700)}
  ${R(568,82,68,32,6,'rgba(0,68,204,0.7)','rgba(255,255,255,0.3)',0.9)}${TW(602,98,'HAL',12,700)}
  ${TG(340,134,'USER SPACE — servidores independientes (ring 3)',11,400)}
  ${R(46,148,138,58,8,mid,'rgba(0,68,204,0.6)',0.9)}${TW(115,170,'Servidor FS',12,700)}${TW(115,185,'archivos',11,400)}
  ${R(202,148,138,58,8,mid,'rgba(0,68,204,0.6)',0.9)}${TW(271,170,'Servidor Net',12,700)}${TW(271,185,'red · TCP-IP',11,400)}
  ${R(358,148,138,58,8,mid,'rgba(0,68,204,0.6)',0.9)}${TW(427,170,'Servidor MM',12,700)}${TW(427,185,'memoria',11,400)}
  ${R(514,148,138,58,8,mid,'rgba(0,68,204,0.6)',0.9)}${TW(583,170,'Servidor I/O',12,700)}${TW(583,185,'dispositivos',11,400)}
  ${L(115,148,100,114,'signal')}
  ${L(271,148,236,114,'signal2')}
  ${L(427,148,372,114,'signal3')}
  ${L(583,148,502,114,'signal')}
  ${R(100,228,480,56,10,bg,'rgba(0,68,204,0.4)',0.9)}
  ${TW(340,248,'USER SPACE — Aplicaciones cliente',13,700)}
  ${TG(340,265,'solicitan servicio → microkernel enruta → servidor responde',11,400)}
  ${LD(220,228,160,206,c)}
  ${LD(340,228,340,206,c)}
  ${LD(460,228,510,206,c)}
  ${TG(340,316,'Mach: ~25K líneas de código. Linux monolítico: ~20M líneas',11,400)}
  `;
}

function renderHybrid(){
  const {color:c,bg,mid}=D.hybrid;
  return DEFS+`
  ${TG(340,16,'Arquitectura Híbrida — combina monolítico con elementos microkernel',11,700)}
  ${R(36,30,608,138,14,c,'none',0)}
  ${R(36,30,608,138,14,'none',c,1.5)}
  ${TW(340,50,'KERNEL EXTENDIDO — modo kernel',13,700)}
  ${TW(340,65,'núcleo microkernel base + módulos integrados + caché/VM',11,400)}
  ${R(56,80,188,74,8,'rgba(125,32,39,0.55)','rgba(255,255,255,0.3)',0.9)}
  ${TW(150,108,'Núcleo microkernel',12,700)}${TW(150,124,'IPC · scheduling base',11,400)}
  ${R(262,80,196,74,8,'rgba(180,100,0,0.55)','rgba(255,255,255,0.3)',0.9)}
  ${TW(360,108,'Módulos en kernel',12,700)}${TW(360,124,'FS · red · drivers',11,400)}
  ${R(476,80,150,74,8,'rgba(0,68,204,0.45)','rgba(255,255,255,0.3)',0.9)}
  ${TW(551,108,'Caché / VM',12,700)}${TW(551,124,'memoria virtual',11,400)}
  ${L(244,117,262,117,'signal',1)}
  ${L(458,117,476,117,'signal2',1)}
  ${R(36,182,608,64,10,bg,'rgba(204,136,0,0.4)',0.9)}
  ${TW(340,202,'USER SPACE — servicios opcionales externalizados',12,700)}
  ${R(66,194,150,42,6,mid,'rgba(204,136,0,0.5)',0.9)}${TW(141,215,'Subsistema POSIX',11,700)}
  ${R(265,194,150,42,6,mid,'rgba(204,136,0,0.5)',0.9)}${TW(340,215,'Servidor seguridad',11,700)}
  ${R(464,194,150,42,6,mid,'rgba(204,136,0,0.5)',0.9)}${TW(539,215,'Servicios Win32',11,700)}
  ${LD(150,117,141,194,c)}
  ${LD(360,154,340,194,c)}
  ${LD(551,154,539,194,c)}
  ${R(100,260,480,50,8,bg,'rgba(204,136,0,0.35)',0.9)}
  ${TW(340,278,'USER SPACE — Aplicaciones',13,700)}
  ${TG(340,294,'syscall → kernel híbrido → módulo interno o servidor',11,400)}
  ${LD(340,260,340,246,c)}
  ${TG(340,322,'Windows NT: HAL + kernel híbrido · macOS: Mach + BSD = XNU',11,400)}
  `;
}

function renderCS(){
  const {color:c,bg,mid}=D.cs;
  return DEFS+`
  ${TG(340,16,'Arquitectura Cliente-Servidor — OS como colección de servidores independientes',11,700)}
  ${R(36,32,298,78,10,c,'none',0)}${R(36,32,298,78,10,'none',c,1.5)}
  ${TW(185,57,'SERVIDOR — Sistema de Archivos',12,700)}${TW(185,73,'operaciones FS en user space',11,400)}
  ${R(346,32,298,78,10,c,'none',0)}${R(346,32,298,78,10,'none',c,1.5)}
  ${TW(495,57,'SERVIDOR — Memoria',12,700)}${TW(495,73,'gestión MM en user space',11,400)}
  ${R(36,130,298,78,10,'rgba(23,100,88,0.8)',c,1.5)}
  ${TW(185,155,'SERVIDOR — Red',12,700)}${TW(185,171,'TCP/IP en user space',11,400)}
  ${R(346,130,298,78,10,'rgba(23,100,88,0.8)',c,1.5)}
  ${TW(495,155,'SERVIDOR — Seguridad',12,700)}${TW(495,171,'auth/permisos user space',11,400)}
  ${R(200,232,280,42,8,c,'none',0)}${R(200,232,280,42,8,'none',c,1.5)}
  ${TW(340,253,'MICROKERNEL — IPC + transporte',12,700)}
  ${L(185,208,228,232,'signal')}
  ${L(495,208,442,232,'signal2')}
  ${L(185,130,185,112,'signal3')}
  ${L(495,130,495,112,'signal')}
  <line x1="185" y1="112" x2="495" y2="112" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="6 4" class="signal2"/>
  <circle cx="340" cy="112" r="5" fill="${c}" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
  ${R(36,292,608,36,8,bg,'rgba(46,139,122,0.35)',0.9)}
  ${TG(340,310,'Aplicaciones cliente envían mensajes → microkernel → servidor correcto → respuesta',11,400)}
  ${TG(340,330,'Plan 9 lleva esto al extremo: todo es un archivo en un servidor',11,400)}
  `;
}

let cmpOpen=false;

function go(a){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.arch===a));
  const d=D[a];
  document.getElementById('sv').innerHTML={mono:renderMono,micro:renderMicro,hybrid:renderHybrid,cs:renderCS}[a]();
  document.getElementById('iP').textContent=d.perf;
  document.getElementById('iS').textContent=d.sec;
  document.getElementById('iE').textContent=d.stab;
  document.getElementById('iX').textContent=d.ex;
}

function toggleCmp(){
  cmpOpen=!cmpOpen;
  document.getElementById('cmpPanel').classList.toggle('show',cmpOpen);
  document.getElementById('cmpBtn').classList.toggle('on',cmpOpen);
  if(cmpOpen)doCmp();
}

const ROWS=[
  {k:'perf',l:'Rendimiento'},{k:'sec',l:'Seguridad'},{k:'stab',l:'Estabilidad'},
  {k:'ipc',l:'Efic. IPC'},{k:'port',l:'Portabilidad'},{k:'mod',l:'Modularidad'}
];
const SB=v=>'●'.repeat(v)+'○'.repeat(5-v);

function doCmp(){
  const a=document.getElementById('sA').value,b=document.getElementById('sB').value;
  document.getElementById('cmpGrid').innerHTML=[a,b].map(x=>{
    const d=D[x];
    return `<div class="cmp-card">
      <div class="cmp-head" style="background:${d.color}">${d.label}</div>
      <div class="cmp-body">
        <p style="font-size:11px;font-family:Arial,sans-serif;color:rgba(255,255,255,0.45);margin-bottom:8px;line-height:1.5">${d.desc}</p>
        ${ROWS.map(r=>`<div class="cmp-row"><span class="rl">${r.l}</span><span style="font-weight:700;font-family:Arial,monospace;letter-spacing:-1px;color:${d.color}">${SB(d.m[r.k])}</span></div>`).join('')}
        <p style="font-size:11px;font-family:Arial,sans-serif;color:rgba(255,255,255,0.35);margin:8px 0 3px">Ventajas</p>
        ${d.pros.map(p=>`<p style="font-size:11px;font-family:Arial,sans-serif;padding:2px 0;color:rgba(255,255,255,0.85)">+ ${p}</p>`).join('')}
        <p style="font-size:11px;font-family:Arial,sans-serif;color:rgba(255,255,255,0.35);margin:6px 0 3px">Limitaciones</p>
        ${d.cons.map(p=>`<p style="font-size:11px;font-family:Arial,sans-serif;padding:2px 0;color:rgba(255,255,255,0.45)">− ${p}</p>`).join('')}
      </div>
    </div>`;
  }).join('');
}

go('mono');
</script>
