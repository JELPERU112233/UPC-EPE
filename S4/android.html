<script>
const DATA={
  a10:{year:'2008',color:'#1db88a',title:'Android 1.0',sub:'HTC Dream (T-Mobile G1) · Linux kernel 2.6.25',
    os:['Android 1.0','Android 1.1'],
    desc:'El primer Android comercial llegó en el HTC Dream/T-Mobile G1 en septiembre 2008. Basado en Linux 2.6.25 con la VM Dalvik de Dan Bornstein, incluía Google Maps, Gmail, YouTube y Android Market (hoy Play Store). La pantalla táctil coexistía con teclado físico QWERTY. Google lo adquirió de Andy Rubin en 2005 por $50M.',
    feats:['Linux kernel 2.6.25 como base del sistema','VM Dalvik: bytecode .dex compilado de Java','Pantalla táctil resistiva + teclado físico QWERTY','Android Market (precursor de Google Play)','Integración nativa Gmail, Maps, YouTube, Calendar','WebKit browser sin soporte Flash','RAM: 192 MB · Almacenamiento: 256 MB','Sin soporte de video grabación en cámara'],
    pros:['Primer OS móvil abierto y gratuito para fabricantes','Ecosistema Google completo de entrada','Arquitectura Linux: seguridad y estabilidad probada','Modelo de negocio gratuito aceleró adopción masiva','Competencia real para iOS recién lanzado'],
    cons:['Interfaz tosca y poco intuitiva vs iOS','Sin soporte de video grabación','Android Market con muy pocas apps al inicio','Dalvik VM: rendimiento inferior a código nativo','Sin soporte de teclado en pantalla completo','Actualizaciones muy lentas por fragmentación OEM']},

  cup:{year:'2009',color:'#1db88a',title:'Cupcake (Android 1.5)',sub:'Primera gran actualización · Widgets · Teclado táctil',
    os:['Android 1.5 Cupcake'],
    desc:'Cupcake fue la primera versión con nombre de postre y la primera gran actualización funcional. Introdujo el teclado en pantalla que hacía prescindible el teclado físico, los widgets en el homescreen y la grabación de video. También llegó la capacidad de publicar videos directamente a YouTube.',
    feats:['Teclado en pantalla (soft keyboard) completo','Widgets en el homescreen por primera vez','Grabación y reproducción de video 3GP','Copia/pegar entre aplicaciones (básico)','Soporte de Bluetooth A2DP/AVRCP (audio estéreo)','Rotación automática de pantalla','Transiciones animadas entre pantallas','YouTube upload directo desde la app'],
    pros:['Teclado táctil eliminó necesidad de hardware físico','Widgets: personalización que iOS tardó años en copiar','Video grabación habilitó nuevos casos de uso','Base para todos los lanzamientos futuros de postre','Actualización OTA (over-the-air) por primera vez'],
    cons:['Teclado en pantalla inicial con errores frecuentes','Widgets consumían RAM y batería notablemente','Sin sincronización de terceros (solo Google)','Copia/pegar incompleta e inconsistente entre apps','Rendimiento general lento en hardware de 2009']},

  fro:{year:'2010',color:'#1db88a',title:'Froyo 2.2',sub:'Frozen Yogurt · JIT compiler · Wi-Fi hotspot',
    os:['Android 2.2 Froyo'],
    desc:'Froyo fue la actualización de rendimiento definitiva. El compilador JIT (Just-In-Time) aceleró Dalvik hasta 5x en benchmarks. Introdujo el Wi-Fi hotspot nativo (tethering), Adobe Flash en el navegador y el Chrome to Phone. También llegó el soporte de instalación de apps en tarjeta SD.',
    feats:['Compilador JIT en Dalvik: hasta 5x más rápido','Wi-Fi hotspot y USB tethering nativos','Adobe Flash 10.1 en el navegador WebKit','Instalación de apps en tarjeta SD (App2SD)','Push notifications via C2DM (Cloud to Device)','Chrome to Phone: continuar navegación en PC','V8 JavaScript engine en el navegador','Enterprise: Exchange ActiveSync mejorado'],
    pros:['JIT compiler: salto de rendimiento percibido enorme','Hotspot WiFi: funcionalidad que operadoras cobraban extra','Flash: acceso a web completa (antes de HTML5)','App2SD: solución al escaso almacenamiento interno','C2DM: base tecnológica de todas las notificaciones push actuales'],
    cons:['Adobe Flash: consumo de batería y crashes frecuentes','JIT no elimina gap de rendimiento vs iOS nativo','Hotspot bloqueado por algunas operadoras via contrato','App2SD con problemas de compatibilidad en muchos devices','Sin cifrado de dispositivo nativo todavía']},

  ics:{year:'2011',color:'#4a90d9',title:'Ice Cream Sandwich 4.0',sub:'Unificación phone + tablet · Holo UI · NFC',
    os:['Android 4.0 ICS'],
    desc:'ICS fue el rediseño más ambicioso de Android hasta entonces. Unificó las ramas de teléfono (Gingerbread) y tablet (Honeycomb) en una sola plataforma. Introdujo el lenguaje de diseño Holo, el botón de recientes en software, Face Unlock y NFC con Android Beam.',
    feats:['Lenguaje de diseño Holo: primer Android cohesivo','Unificación phone + tablet en un único OS','Botones de navegación en software (sin hardware)','Face Unlock: desbloqueo por reconocimiento facial','NFC + Android Beam: compartir por aproximación','Data Usage: control de consumo de datos móviles','Ice Cream Sandwich API level 14-15','Mejora de cámara: zero shutter lag, panorama'],
    pros:['Primer Android con identidad visual coherente','Unificación simplificó desarrollo para fabricantes','NFC: primer OS con pagos contactless (base de Google Pay)','Botones software: pantalla completa aprovechada','Control de datos: ahorro real en tarifas limitadas'],
    cons:['Holo UI: coherente pero estéticamente fría y genérica','Face Unlock: inseguro (foto plana lo engañaba)','Android Beam: adopción casi nula por usuarios','Requisitos de RAM elevados: devices de gama baja sufrían','Fragmentación: muchos OEM tardaron 1+ año en actualizar']},

  jb:{year:'2012',color:'#4a90d9',title:'Jelly Bean 4.1–4.3',sub:'Project Butter · Google Now · Notificaciones expandibles',

function openModal(id){
  const d=DATA[id];
  if(!d)return;
  const yr=document.getElementById('mYr');
  yr.textContent=d.year; yr.style.color=d.color;
  document.getElementById('mTi').textContent=d.title;
  document.getElementById('mSu').textContent=d.sub;
  document.getElementById('mDs').textContent=d.desc;
  document.getElementById('modalBox').style.borderColor=d.color;
  document.getElementById('mOs').innerHTML=d.os.map(o=>`<span class="os-tag" style="border-color:${d.color}40;color:${d.color}">${o}</span>`).join('');
  const dot=c=>`<span style="position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:${c};display:block"></span>`;
  document.getElementById('mFe').innerHTML=d.feats.map(f=>`<div class="mi">${dot(d.color)}${f}</div>`).join('');
  document.getElementById('mPr').innerHTML=d.pros.map(p=>`<div class="mi pro">${p}</div>`).join('');
  document.getElementById('mCo').innerHTML=d.cons.map(c=>`<div class="mi con">${c}</div>`).join('');
  document.getElementById('modalBg').classList.add('show');
}
function closeBg(e){if(e.target===document.getElementById('modalBg'))closeM();}
function closeM(){document.getElementById('modalBg').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
</script>
