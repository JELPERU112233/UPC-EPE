<style>

@media(max-width:540px){.og{grid-template-columns:1fr}}
.ob{position:relative;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-align:left;padding:14px 16px 14px 46px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--t1);cursor:pointer;transition:all .2s;min-height:52px;display:flex;align-items:center;line-height:1.35}

.bn{margin-top:16px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);background:transparent;border:1.5px solid rgba(56,189,248,0.25);border-radius:10px;padding:11px 32px;cursor:pointer;transition:all .25s;display:none}

.rc{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:44px 32px;text-align:center;backdrop-filter:blur(16px);width:100%;position:relative;overflow:hidden;margin-top:60px}
.rc::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:linear-gradient(90deg,transparent,var(--ok),transparent)}
.rl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.rg{font-family:'Outfit',sans-serif;font-size:clamp(52px,11vw,86px);font-weight:900;line-height:1;margin-bottom:4px}
.ro{font-family:'Space Mono',monospace;font-size:13px;color:var(--t3);margin-bottom:24px}
.rbw{width:80%;max-width:380px;margin:0 auto 24px;height:8px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden}
.rbf{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.rm{font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;margin-bottom:6px}
.rs{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.55;max-width:500px;margin-left:auto;margin-right:auto}
.rbd{display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:28px}
.rb{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:12px;text-align:left}
.rbi{font-size:16px;flex-shrink:0;width:28px;text-align:center}
.rbq{flex:1;color:var(--t2);line-height:1.3}
.rbp{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;flex-shrink:0}
.rb.ok .rbp{color:var(--ok)}.rb.no .rbp{color:var(--no)}
.brt{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--violet),#8b5cf6);border:none;border-radius:14px;padding:14px 44px;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(167,139,250,0.25)}
.brt:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(167,139,250,0.35)}
.cf{position:fixed;z-index:100;pointer-events:none;animation:cfl linear forwards}
@keyframes cfl{0%{transform:translateY(-15vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>

<script>
const D=[
{m:'fs',ml:'SISTEMAS DE ARCHIVOS',mc:'fs',rf:'Láminas 6–7',
q:'¿Qué mecanismo utiliza NTFS para registrar cambios pendientes antes de ejecutarlos en disco, garantizando la recuperación ante fallos?',
o:['Copy-on-Write (CoW)','Journaling (registro de bitácora)','Checksums de extremo a extremo','Extents de bloques contiguos'],a:1,
y:'¡Exacto! NTFS utiliza <strong>Journaling</strong>: registra operaciones pendientes en un journal antes de ejecutarlas. El proceso es: Registrar → Ejecutar → Confirmar → Recuperar si hay fallo. Reduce la recuperación tras cortes de energía de horas (con fsck) a segundos.',
n:'La respuesta correcta es <strong>Journaling</strong>. NTFS registra cambios en un journal antes de ejecutarlos. Copy-on-Write es de ZFS, los checksums end-to-end también son de ZFS, y los Extents son la innovación de EXT4.'},
{m:'fs',ml:'SISTEMAS DE ARCHIVOS',mc:'fs',rf:'Lámina 7',
q:'¿Qué mecanismo de NTFS permite definir permisos granulares por usuario/grupo sobre archivos y carpetas, con herencia y auditoría?',
o:['EFS (Encrypting File System)','Cuotas de disco','ACLs (Listas de Control de Acceso)','Enlaces simbólicos'],a:2,
y:'¡Correcto! Las <strong>ACLs</strong> son el pilar de seguridad de NTFS. Permiten control preciso por usuario/grupo, herencia de permisos desde directorios padre, y auditoría de quién accede a qué y cuándo para cumplimiento normativo.',
n:'La respuesta correcta es <strong>ACLs (Listas de Control de Acceso)</strong>. EFS es cifrado, las cuotas limitan espacio por usuario, y los enlaces simbólicos son referencias a rutas. Las ACLs manejan permisos granulares con herencia y auditoría.'},
{m:'fs',ml:'SISTEMAS DE ARCHIVOS',mc:'fs',rf:'Láminas 10–11',
q:'¿Cuál es el modo de journaling por defecto en EXT4 que ofrece el mejor compromiso entre seguridad y rendimiento?',
o:['data=writeback','data=journal','data=ordered','data=sync'],a:2,
y:'¡Perfecto! <strong>data=ordered</strong> es el modo por defecto. Registra metadatos en el journal y asegura que los datos se escriban antes que sus metadatos. Es más seguro que writeback y más rápido que data=journal.',
n:'La respuesta correcta es <strong>data=ordered</strong>. data=journal registra TODO (máxima seguridad, menor rendimiento). data=writeback solo registra metadatos (máximo rendimiento, menor consistencia). data=sync no existe en EXT4.'},
{m:'fs',ml:'SISTEMAS DE ARCHIVOS',mc:'fs',rf:'Láminas 13–14',
q:'¿Qué principio de ZFS garantiza que nunca se sobrescriban datos existentes, escribiendo siempre en bloques nuevos antes de actualizar punteros?',
o:['Journaling transaccional','Storage Pools (zpools)','RAID-Z con triple paridad','Copy-on-Write (CoW)'],a:3,
y:'¡Excelente! <strong>Copy-on-Write (CoW)</strong> es el principio fundamental de ZFS. Los datos se escriben en bloques nuevos; solo al completarse se actualizan los punteros. Esto permite snapshots instantáneos (cero costo) y elimina la necesidad de fsck.',
n:'La respuesta correcta es <strong>Copy-on-Write (CoW)</strong>. ZFS escribe en bloques nuevos y actualiza punteros solo al completarse. Esto garantiza integridad, permite snapshots instantáneos y elimina fsck. zpools es el modelo de almacenamiento, RAID-Z es protección de datos.'},
{m:'fs',ml:'SISTEMAS DE ARCHIVOS',mc:'fs',rf:'Lámina 16',
q:'Según la tabla comparativa, ¿cuáles capacidades son EXCLUSIVAS de ZFS frente a NTFS y EXT4?',
o:['Journaling y cifrado nativo','Compresión y archivos grandes','RAID integrado y deduplicación','Snapshots y cuotas de disco'],a:2,
y:'¡Muy bien! <strong>RAID integrado (RAID-Z1/Z2/Z3) y deduplicación</strong> son exclusivos de ZFS. También es el único con checksums de datos + metadatos. NTFS tiene compresión y cifrado, pero ninguno tiene RAID integrado ni deduplicación.',
n:'La respuesta correcta es <strong>RAID integrado y deduplicación</strong>. Journaling lo tienen NTFS y EXT4. Compresión la tiene NTFS. Cifrado lo tiene NTFS (EFS/BitLocker). RAID-Z1/Z2/Z3 y deduplicación son exclusivos de ZFS.'},
{m:'vm',ml:'MEMORIA VIRTUAL',mc:'vm',rf:'Láminas 23–25',
q:'¿Qué componente de hardware traduce direcciones virtuales a direcciones físicas en RAM, consultando primero el TLB como caché?',
o:['La tabla de páginas del SO','La MMU (Memory Management Unit)','El controlador de disco SATA','La caché L2 del procesador'],a:1,
y:'¡Correcto! La <strong>MMU</strong> es el hardware que traduce direcciones. Su flujo: proceso genera dirección virtual → MMU consulta TLB → TLB Hit = acceso directo a RAM; TLB Miss = consulta tabla de páginas → Page Fault si la página está en disco (swap).',
n:'La respuesta correcta es la <strong>MMU (Memory Management Unit)</strong>. La tabla de páginas es una estructura del SO que la MMU consulta, pero la MMU (hardware) realiza la traducción. El controlador de disco gestiona I/O, no traducción de direcciones.'},
{m:'vm',ml:'MEMORIA VIRTUAL',mc:'vm',rf:'Lámina 25',
q:'Un Page Fault genera acceso a disco (~10 ms) vs. acceso a RAM (~60 ns). ¿Cuántas veces más lento es aproximadamente un Page Fault?',
o:['1,000× más lento','10,000× más lento','100,000× más lento','1,000,000× más lento'],a:2,
y:'¡Exacto! <strong>100,000× más lento</strong>. El cálculo: 10 ms = 10,000,000 ns ÷ 60 ns ≈ 166,667×, redondeado a ~100,000×. Esta diferencia monumental es la razón por la que minimizar page faults es absolutamente crítico para el rendimiento.',
n:'La respuesta correcta es <strong>100,000× más lento</strong>. Cálculo: 10 ms (10,000,000 ns) ÷ 60 ns ≈ 166,667× ≈ 100,000×. Por eso la gestión eficiente de memoria virtual y la minimización de page faults son fundamentales en el diseño de sistemas.'},
{m:'hdd',ml:'ANATOMÍA DEL HDD',mc:'hdd',rf:'Lámina 27',
q:'¿Qué componente del HDD posiciona físicamente el cabezal de lectura/escritura sobre la pista correcta del plato magnético?',
o:['La tarjeta controladora (PCB)','El motor del husillo (spindle)','El brazo actuador','El sector de arranque (MBR)'],a:2,
y:'¡Correcto! El <strong>brazo actuador</strong> usa un motor de voz para posicionar el cabezal a nanómetros de la superficie, sin contacto físico. Es el responsable del seek time. El motor del husillo gira los platos (5,400–15,000 RPM) y la PCB gestiona I/O y protocolos.',
n:'La respuesta correcta es el <strong>brazo actuador</strong>. El husillo hace girar los platos. La PCB gestiona I/O, caché y protocolos SATA/SAS. El MBR es una estructura lógica del disco. El brazo actuador determina el seek time al posicionar el cabezal.'},
{m:'algo',ml:'PLANIFICACIÓN DE DISCO',mc:'algo',rf:'Láminas 29–30',
q:'Con peticiones [82,170,43,140,24,16,190] desde pista 50, ¿qué algoritmo genera el MENOR seek time (208 pistas) pero puede causar inanición?',
o:['FCFS (First Come First Served)','SCAN (Algoritmo del Ascensor)','SSTF (Shortest Seek Time First)','C-SCAN (Circular SCAN)'],a:2,
y:'¡Perfecto! <strong>SSTF</strong> genera 208 pistas al atender siempre la petición más cercana. Sin embargo, puede causar <strong>inanición</strong> en extremos. Comparativa: FCFS=642 (simple, sin inanición), SCAN=332 (equitativo), C-SCAN=391 (máxima equidad).',
n:'La respuesta correcta es <strong>SSTF</strong> con 208 pistas. Atiende siempre la petición más cercana, minimizando movimiento pero arriesgando inanición. FCFS=642 pistas, SCAN=332, C-SCAN=391. SSTF es el más eficiente pero menos equitativo.'},
{m:'algo',ml:'PLANIFICACIÓN DE DISCO',mc:'algo',rf:'Lámina 31',
q:'¿Qué algoritmo de planificación ofrece la MÁXIMA equidad en tiempos de espera y es el más recomendado para bases de datos con alta carga?',
o:['FCFS','SSTF','SCAN','C-SCAN'],a:3,
y:'¡Excelente! <strong>C-SCAN</strong> ofrece "muy alta" equidad: atiende en una dirección, al llegar al extremo retorna al inicio sin servir en el camino. Garantiza tiempos de espera uniformes y predecibles, ideal para BBDD y alta carga transaccional.',
n:'La respuesta correcta es <strong>C-SCAN</strong>. Tiene equidad "Muy Alta" vs. SCAN con equidad "Alta". C-SCAN atiende en una dirección y retorna sin servir, logrando tiempos uniformes. Su seek time (391) es mayor que SCAN (332), pero la predictibilidad es más valiosa en BBDD.'}
];
const P=2,T=25;let c=0,s=0,r=[],ti=null,tl=0;

function cft(){const cl=['#38bdf8','#c41e3a','#2dd4bf','#fbbf24','#a78bfa','#fb7185','#34d399'];
